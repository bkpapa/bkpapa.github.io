<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1.0" />
<title>Deal Board Dynamic Final</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1920px;
    height: 260px;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #111;
  }

  body {
    position: relative;
  }

  .board {
    position: relative;
    width: 1920px;
    height: 260px;
    overflow: hidden;
    background:
      radial-gradient(circle at 30% 40%, rgba(255,200,70,0.14) 0%, rgba(255,200,70,0.00) 28%),
      linear-gradient(90deg, #121212 0%, #1a1a1a 40%, #222222 100%);
  }

  /* ===== 左侧面板 ===== */
  .left-panel {
    position: absolute;
    left: 0;
    top: 0;
    width: 340px;
    height: 260px;
    padding: 28px 32px;
    background: linear-gradient(135deg, #101010, #191919);
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .left-kicker {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #ffcf56;
    text-transform: uppercase;
  }

  .left-title {
    margin-top: 10px;
    color: #fff;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    line-height: 0.9;
    letter-spacing: -1px;
  }

  .left-title .l1 { font-size: 58px; }
  .left-title .l2,
  .left-title .l3 { font-size: 76px; }

  /* ===== 主体连续区 ===== */
  .main-strip {
    position: absolute;
    left: 340px;
    top: 0;
    width: 1580px;
    height: 260px;
    display: flex;
    align-items: flex-start;
  }

  /* ===== 主推模块 ===== */
  .hero {
    position: relative;
    width: 560px;
    height: 224px;
    margin-top: 18px;
    margin-left: 12px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
    box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    overflow: hidden;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 50%, rgba(255,209,84,0.07) 0%, rgba(255,209,84,0.00) 34%);
    pointer-events: none;
  }

  .hero-product {
    position: absolute;
    left: 26px;
    top: 28px;
    width: 170px;
    height: 170px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .hero-product img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.18));
  }

  .hero-copy {
    position: absolute;
    left: 210px;
    top: 24px;
    width: 320px;
    z-index: 2;
    font-family: Arial, Helvetica, sans-serif;
  }

  .badge {
    display: inline-block;
    min-width: 172px;
    text-align: center;
    background: linear-gradient(#ffd86c, #f3b733);
    color: #111;
    padding: 9px 22px;
    border-radius: 999px;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
  }

  .headline {
    margin-top: 12px;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
  }

  .price {
    margin-top: 12px;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    font-size: 70px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -2px;
    color: #ffd65a;
    white-space: nowrap;
    animation: pricePulse 2.6s ease-in-out infinite;
    transform-origin: left center;
  }

  @keyframes pricePulse {
    0%, 100% { transform: scale(1); text-shadow: 0 0 0 rgba(255,214,90,0); }
    50% { transform: scale(1.03); text-shadow: 0 0 18px rgba(255,214,90,0.14); }
  }

  .sub {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.62);
    line-height: 1.2;
    white-space: nowrap;
  }

  /* ===== 右侧整体模块 ===== */
  .products-wrap {
    position: relative;
    width: 988px;
    height: 224px;
    margin-top: 18px;
    margin-left: 8px;
    border-radius: 22px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.025) 48%, rgba(255,255,255,0.035) 100%);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  .products-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        90deg,
        rgba(255,255,255,0.00) 0%,
        rgba(255,255,255,0.018) 18%,
        rgba(255,255,255,0.00) 40%,
        rgba(255,255,255,0.012) 64%,
        rgba(255,255,255,0.00) 100%
      );
    pointer-events: none;
    z-index: 1;
  }

  .products-viewport {
    position: absolute;
    left: 14px;
    top: 9px;
    width: 920px;
    height: 206px;
    overflow: hidden;
    z-index: 2;
  }

  .products-track {
    display: flex;
    height: 206px;
    will-change: transform;
    transition: transform 520ms cubic-bezier(0.22, 0.8, 0.22, 1);
  }

  .page {
    width: 920px;
    height: 206px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .item {
    position: relative;
    width: 164px;
    height: 206px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.018) 100%);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.05),
      0 6px 16px rgba(0,0,0,0.14);
    overflow: hidden;
  }

  /* 顶部折扣条：回到你确认的版本 */
  .discount-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 10;
    min-width: 86px;
    height: 26px;
    padding: 0 10px;
    border-radius: 9px;
    background: linear-gradient(180deg, #ffd86c, #f1b028);
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.25px;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    box-shadow:
      0 3px 8px rgba(0,0,0,0.24),
      0 0 8px rgba(255,200,70,0.14);
  }

  .img-area {
    position: absolute;
    left: 16px;
    right: 16px;
    top: 18px;
    height: 98px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 1;
  }

  .img-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.20));
  }

  .info-area {
    position: absolute;
    left: 0;
    right: 0;
    top: 126px;
    height: 20px;
    text-align: center;
    z-index: 2;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.56);
    white-space: nowrap;
  }

  .info-area .was {
    color: rgba(255,255,255,0.46);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .info-area .old {
    color: rgba(255,255,255,0.72);
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
  }

  .item-price {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 16px;
    height: 40px;
    border-radius: 999px;
    background: linear-gradient(180deg, #ffd86c 0%, #f1b028 100%);
    color: #111111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Arial Black", Arial, Helvetica, sans-serif;
    font-size: 21px;
    font-weight: 900;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 14px rgba(255,193,43,0.18);
    z-index: 3;
  }

  /* 仅保留右箭头 */
  .nav-arrow {
    position: absolute;
    top: 50%;
    width: 36px;
    height: 68px;
    transform: translateY(-50%);
    opacity: 0.90;
    cursor: pointer;
    z-index: 5;
    user-select: none;
    filter:
      drop-shadow(0 0 8px rgba(255,200,70,0.30))
      drop-shadow(0 0 16px rgba(255,200,70,0.12));
    transition: opacity 180ms ease, transform 180ms ease;
  }

  .nav-arrow:hover {
    opacity: 1;
  }

  .nav-arrow:active {
    transform: translateY(-50%) scale(0.95);
  }

  .nav-arrow.right {
    right: 18px;
  }

  .nav-arrow svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  img {
    color: transparent;
    font-size: 0;
  }
</style>
</head>

<body>
<div class="board">

  <div class="left-panel">
    <div class="left-kicker">IN-STORE PROMO</div>
    <div class="left-title">
      <div class="l1">TODAY'S</div>
      <div class="l2">DEAL</div>
      <div class="l3">ZONE</div>
    </div>
  </div>

  <div class="main-strip">

    <div class="hero" id="hero">
      <div class="hero-product">
        <img id="heroImage" src="images/main.png" alt="">
      </div>

      <div class="hero-copy">
        <div class="badge" id="heroBadge">BEST DEAL</div>
        <div class="headline" id="heroHeadline">Top Pick This Week</div>
        <div class="price" id="heroPrice">£ 9.99</div>
        <div class="sub" id="heroSub">Limited-time offer.</div>
      </div>
    </div>

    <div class="products-wrap">
      <div class="products-viewport">
        <div class="products-track" id="productsTrack"></div>
      </div>
    </div>

  </div>

  <div class="nav-arrow right" id="nextBtn" aria-label="Next page">
    <svg viewBox="0 0 42 78" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M10 12 L28 39 L10 66"
        fill="none"
        stroke="rgba(255,210,90,0.95)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </div>

</div>

<script>
  const heroData = {
    image: "images/main.png",
    badge: "BEST DEAL",
    headline: "Top Pick This Week",
    price: "£ 9.99",
    sub: "Limited-time offer."
  };

  const products = [
    { image: "images/p1.png", oldPrice: "£ 49.99", newPrice: "£ 34.99", discountText: "SAVE 29%" },
    { image: "images/p2.png", oldPrice: "£ 14.99", newPrice: "£ 12.49", discountText: "SAVE 17%" },
    { image: "images/p3.png", oldPrice: "£ 14.99", newPrice: "£ 12.49", discountText: "SAVE 17%" },
    { image: "images/p4.png", oldPrice: "£ 14.99", newPrice: "£ 12.49", discountText: "SAVE 17%" },
    { image: "images/p5.png", oldPrice: "£ 14.99", newPrice: "£ 12.49", discountText: "SAVE 17%" },
    { image: "images/p6.png", oldPrice: "£ 21.99", newPrice: "£ 17.99", discountText: "SAVE 18%" },
    { image: "images/p7.png", oldPrice: "£ 18.99", newPrice: "£ 14.99", discountText: "SAVE 21%" },
    { image: "images/p8.png", oldPrice: "£ 9.99", newPrice: "£ 7.99", discountText: "SAVE 20%" },
    { image: "images/p9.png", oldPrice: "£ 29.99", newPrice: "£ 24.99", discountText: "SAVE 17%" },
    { image: "images/p10.png", oldPrice: "£ 19.99", newPrice: "£ 15.99", discountText: "SAVE 20%" }
  ];

  const PRODUCTS_PER_PAGE = 5;
  const AUTO_ADVANCE_MS = 4500;

  document.getElementById("heroImage").src = heroData.image;
  document.getElementById("heroBadge").textContent = heroData.badge;
  document.getElementById("heroHeadline").textContent = heroData.headline;
  document.getElementById("heroPrice").textContent = heroData.price;
  document.getElementById("heroSub").textContent = heroData.sub;

  const track = document.getElementById("productsTrack");
  const nextBtn = document.getElementById("nextBtn");

  const pages = [];
  for (let i = 0; i < products.length; i += PRODUCTS_PER_PAGE) {
    pages.push(products.slice(i, i + PRODUCTS_PER_PAGE));
  }

  let currentPage = 0;
  let autoTimer = null;

  function makeItem(product) {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <div class="discount-badge">${product.discountText}</div>
      <div class="img-area">
        <img src="${product.image}" alt="">
      </div>
      <div class="info-area">
        <span class="was">Was</span><span class="old">${product.oldPrice}</span>
      </div>
      <div class="item-price">${product.newPrice}</div>
    `;
    return item;
  }

  function renderPages() {
    track.innerHTML = "";

    pages.forEach((pageItems) => {
      const page = document.createElement("div");
      page.className = "page";

      pageItems.forEach(product => {
        page.appendChild(makeItem(product));
      });

      while (page.children.length < PRODUCTS_PER_PAGE) {
        const spacer = document.createElement("div");
        spacer.style.width = "164px";
        spacer.style.height = "206px";
        spacer.style.flexShrink = "0";
        page.appendChild(spacer);
      }

      track.appendChild(page);
    });
  }

  function goToPage(index) {
    currentPage = (index + pages.length) % pages.length;
    track.style.transform = `translateX(-${currentPage * 920}px)`;
  }

  function nextPage() {
    goToPage(currentPage + 1);
  }

  function startAuto() {
    stopAuto();
    autoTimer = setInterval(() => {
      nextPage();
    }, AUTO_ADVANCE_MS);
  }

  function stopAuto() {
    if (autoTimer) clearInterval(autoTimer);
  }

  nextBtn.addEventListener("click", () => {
    nextPage();
    startAuto();
  });

  document.querySelector(".products-wrap").addEventListener("mouseenter", stopAuto);
  document.querySelector(".products-wrap").addEventListener("mouseleave", startAuto);

  renderPages();
  goToPage(0);
  startAuto();
</script>
</body>
</html>
